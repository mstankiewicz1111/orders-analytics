<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logowanie</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f7f7f8; color: #222; }
      .card { max-width: 420px; margin: 80px auto; background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.05); }
      h1 { margin-top: 0; }
      label { display: block; margin-bottom: 6px; font-weight: 600; }
      input { width: 100%; padding: 10px 12px; margin-bottom: 14px; box-sizing: border-box; }
      button { padding: 10px 14px; cursor: pointer; }
      .error { background: #fff1f1; color: #9a1b1b; border: 1px solid #f2c6c6; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
      .meta { color: #666; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Logowanie do panelu</h1>
      <p class="meta">Zaloguj się, aby przeglądać tabelę, uruchamiać synchronizację i eksportować CSV.</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <label for="username">Login</label>
        <input id="username" name="username" type="text" required autofocus>

        <label for="password">Hasło</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Zaloguj</button>
      </form>
    </div>
  </body>
</html>
